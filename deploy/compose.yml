# À placer sur le serveur (ex. renommer en docker-compose.yml) dans DEPLOY_PATH.
# Fichier .env à côté (runtime, aligné sur .env local) :
#   AUTH_SECRET ou NEXTAUTH_SECRET, NEXTAUTH_URL (URL publique du front),
#   PORT (optionnel, défaut 3000).

services:
  web:
    image: ${FRONTEND_IMAGE}
    env_file:
      - .env
    ports:
      - "${PORT:-3000}:3000"
    restart: unless-stopped
