<svg viewBox="0 0 520 140" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DoniSend">
  <title>DoniSend</title>

  <!-- Icon (same style as favicon.svg / Logo icon-only) -->
  <g transform="translate(12 12)">
    <circle cx="58" cy="58" r="58" fill="#1F3A5F" />
    <circle cx="58" cy="58" r="54" fill="none" stroke="#2ECC71" stroke-width="4" opacity="0.6" />
    <line x1="26" y1="58" x2="76" y2="58" stroke="#2ECC71" stroke-width="8" stroke-linecap="round" />
    <polyline
      points="60,36 86,58 60,80"
      fill="none"
      stroke="#2ECC71"
      stroke-width="8"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <line x1="26" y1="42" x2="54" y2="42" stroke="#2ECC71" stroke-width="5" stroke-linecap="round" opacity="0.45" />
    <line x1="26" y1="74" x2="54" y2="74" stroke="#2ECC71" stroke-width="5" stroke-linecap="round" opacity="0.45" />
  </g>

  <!-- Wordmark: DoniSend (Send in green, no space) -->
  <text
    x="160"
    y="92"
    font-family="Sora, Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif"
    font-size="76"
    letter-spacing="-2.2"
  >
    <tspan font-weight="800" fill="#0B1220">Doni</tspan>
    <!-- dx negative to visually “glue” i + S without a gap -->
    <tspan dx="-10" font-weight="300" fill="#2ECC71">Send</tspan>
  </text>
</svg>

