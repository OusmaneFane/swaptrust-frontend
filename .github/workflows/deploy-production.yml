name: Deploy — Production

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit

  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: quality
    environment: main
    permissions:
      contents: read
      packages: write
      actions: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=sha,prefix=prod-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_SOCKET_URL=${{ secrets.NEXT_PUBLIC_SOCKET_URL }}
            NEXT_PUBLIC_APP_ENV=production
            API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    environment: main

    steps:
      - name: Verify SSH and GHCR secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
        run: |
          missing=()
          [ -z "$VPS_HOST" ] && missing+=("VPS_HOST")
          [ -z "$VPS_USER" ] && missing+=("VPS_USER")
          [ -z "$VPS_SSH_KEY" ] && missing+=("VPS_SSH_KEY")
          [ -z "$GHCR_TOKEN" ] && missing+=("GHCR_TOKEN")
          [ -z "$GHCR_USERNAME" ] && missing+=("GHCR_USERNAME")
          if ((${#missing[@]})); then
            echo "::error::Missing or empty secrets: ${missing[*]}. Add them under Settings → Environments → main (or repository secrets)."
            exit 1
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script_stop: true
          script: |
            set -euo pipefail
            CONTAINER_NAME=donisend-frontend-prod

            echo "Deploying Production..."

            echo ${{ secrets.GHCR_TOKEN }} | \
              docker login ghcr.io -u ${{ secrets.GHCR_USERNAME }} --password-stdin

            docker network inspect donisend-net >/dev/null 2>&1 || docker network create donisend-net

            IMAGE="ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')"
            docker pull "${IMAGE}:latest"

            docker stop "${CONTAINER_NAME}" 2>/dev/null || true
            docker rm "${CONTAINER_NAME}" 2>/dev/null || true

            docker run -d \
              --name "${CONTAINER_NAME}" \
              --restart unless-stopped \
              --network donisend-net \
              -p 3000:3000 \
              -e NODE_ENV=production \
              -e NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
              -e NEXT_PUBLIC_SOCKET_URL=${{ secrets.NEXT_PUBLIC_SOCKET_URL }} \
              "${IMAGE}:latest"

            sleep 3
            if ! docker inspect "${CONTAINER_NAME}" | grep -qE '"Running"[[:space:]]*:[[:space:]]*true'; then
              echo "Container exited or failed to start."
              docker inspect "${CONTAINER_NAME}" | head -c 4000 || true
              docker logs --tail 120 "${CONTAINER_NAME}" 2>&1 || true
              exit 1
            fi

            docker image prune -f

            echo "Production deployed on port 3000 (container ${CONTAINER_NAME} running)"

      - name: Notify success
        run: echo "Deploy Production OK → https://donisend.com"
