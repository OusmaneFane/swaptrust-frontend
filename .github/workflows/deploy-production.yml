  deploy:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: build
    environment: main   # 🔥 IMPORTANT (active GitHub Environment)

    steps:
      - name: Validate secrets
        run: |
          test -n "${{ secrets.VPS_HOST }}" || (echo "VPS_HOST missing" && exit 1)
          test -n "${{ secrets.VPS_USER }}" || (echo "VPS_USER missing" && exit 1)
          test -n "${{ secrets.VPS_SSH_KEY }}" || (echo "VPS_SSH_KEY missing" && exit 1)

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            set -euo pipefail

            CONTAINER=donisend-frontend-prod
            IMAGE="ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]'):latest"

            echo "🚀 Deploy frontend production"

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

            docker network inspect donisend-net >/dev/null 2>&1 || docker network create donisend-net

            docker pull "$IMAGE"

            docker stop "$CONTAINER" || true
            docker rm "$CONTAINER" || true

            docker run -d \
              --name "$CONTAINER" \
              --restart unless-stopped \
              --network donisend-net \
              -p 3000:3000 \
              -e NODE_ENV=production \
              -e NEXT_PUBLIC_API_URL="${{ secrets.NEXT_PUBLIC_API_URL }}" \
              -e NEXT_PUBLIC_SOCKET_URL="${{ secrets.NEXT_PUBLIC_SOCKET_URL }}" \
              "$IMAGE"

            echo "✔ Frontend running"
            docker ps | grep "$CONTAINER"