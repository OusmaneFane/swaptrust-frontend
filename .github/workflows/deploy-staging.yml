name: Deploy — Staging

on:
  push:
    branches: [staging]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit

  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: quality
    environment: Staging
    permissions:
      contents: read
      packages: write
      actions: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=staging
            type=sha,prefix=stg-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_SOCKET_URL=${{ secrets.NEXT_PUBLIC_SOCKET_URL }}
            NEXT_PUBLIC_APP_ENV=staging
            API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Staging Server
    runs-on: ubuntu-latest
    needs: build
    environment: Staging

    steps:
      - name: Verify SSH and GHCR secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
        run: |
          missing=()
          [ -z "$VPS_HOST" ] && missing+=("VPS_HOST")
          [ -z "$VPS_USER" ] && missing+=("VPS_USER")
          [ -z "$VPS_SSH_KEY" ] && missing+=("VPS_SSH_KEY")
          [ -z "$GHCR_TOKEN" ] && missing+=("GHCR_TOKEN")
          [ -z "$GHCR_USERNAME" ] && missing+=("GHCR_USERNAME")
          if ((${#missing[@]})); then
            echo "::error::Missing or empty secrets: ${missing[*]}. Add them under Settings → Environments → Staging (or repository secrets)."
            exit 1
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script: |
            echo "Deploying Staging..."

            echo ${{ secrets.GHCR_TOKEN }} | \
              docker login ghcr.io -u ${{ secrets.GHCR_USERNAME }} --password-stdin

            IMAGE="ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')"
            docker pull "${IMAGE}:staging"

            docker stop donisend-frontend-staging 2>/dev/null || true
            docker rm donisend-frontend-staging 2>/dev/null || true

            docker run -d \
              --name donisend-frontend-staging \
              --restart unless-stopped \
              --network donisend-net \
              -p 3020:3000 \
              -e NODE_ENV=production \
              -e NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
              -e NEXT_PUBLIC_SOCKET_URL=${{ secrets.NEXT_PUBLIC_SOCKET_URL }} \
              "${IMAGE}:staging"

            docker image prune -f

            echo "Staging deployed on port 3020"
