name: Deploy (reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: 'GitHub Environment name (develop | staging | main)'
        required: true
        type: string
      image_tag:
        description: 'Docker image tag (= branch name)'
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-publish-deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    concurrency:
      group: deploy-${{ inputs.image_tag }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Image name (GHCR lowercases)
        id: image
        run: echo "IMAGE_BASE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.IMAGE_BASE }}:${{ inputs.image_tag }}
            ${{ steps.image.outputs.IMAGE_BASE }}:${{ inputs.image_tag }}-${{ github.sha }}
          build-args: |
            API_URL=${{ secrets.API_URL }}
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_SOCKET_URL=${{ secrets.NEXT_PUBLIC_SOCKET_URL }}
            NEXT_PUBLIC_AUTH_LOGIN_PATH=${{ secrets.NEXT_PUBLIC_AUTH_LOGIN_PATH }}
            NEXT_PUBLIC_COMMISSION_PERCENT=${{ secrets.NEXT_PUBLIC_COMMISSION_PERCENT }}
            NEXT_PUBLIC_SWAPTRUST_ORANGE_MONEY=${{ secrets.NEXT_PUBLIC_SWAPTRUST_ORANGE_MONEY }}
            NEXT_PUBLIC_SWAPTRUST_WAVE=${{ secrets.NEXT_PUBLIC_SWAPTRUST_WAVE }}
            NEXT_PUBLIC_SWAPTRUST_BANK_IBAN=${{ secrets.NEXT_PUBLIC_SWAPTRUST_BANK_IBAN }}
            NEXT_PUBLIC_SWAPTRUST_BANK_NAME=${{ secrets.NEXT_PUBLIC_SWAPTRUST_BANK_NAME }}

      - name: Deploy on server (SSH)
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          IMAGE: ${{ steps.image.outputs.IMAGE_BASE }}:${{ inputs.image_tag }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 15m
          script_stop: true
          envs: DEPLOY_PATH,IMAGE,GHCR_USER,GHCR_TOKEN
          script: |
            set -eu
            test -n "${DEPLOY_PATH:-}"
            cd "$DEPLOY_PATH"
            export FRONTEND_IMAGE="$IMAGE"
            printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker compose pull web
            docker compose up -d --remove-orphans web
